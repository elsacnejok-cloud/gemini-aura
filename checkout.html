<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа — AURA</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-box { max-width: 500px; margin: 80px auto; background: white; padding: 40px; border-radius: 8px; border: 1px solid #f8f6f5; box-shadow: 0 5px 25px rgba(0,0,0,0.01); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #e5e5e5; border-radius: 4px; outline: none; }
        .form-group input:focus { border-color: #f3a3a3; }
    </style>
</head>
<body style="background-color: #fdfcfb;">

    <div class="checkout-box">
        <h2 style="font-weight: 300; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; text-align: center;">Доставка AURA</h2>
        <form id="checkout-form">
            <div class="form-group">
                <label>Ваше Имя</label>
                <input type="text" required placeholder="Елена">
            </div>
            <div class="form-group">
                <label>Телефон для связи</label>
                <input type="tel" required placeholder="+7 (999) 000-00-00">
            </div>
            <div class="form-group">
                <label>Город и адрес доставки</label>
                <input type="text" required placeholder="г. Москва, ул. Ленина, д. 5">
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 15px;">Подтвердить заказ</button>
        </form>
    </div>

    <script>
        document.getElementById('checkout-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Бьюти-ритуал оформлен! Спасибо за покупку в магазине AURA (Имитация без бэкенда). Ваша корзина будет очищена.');
            localStorage.removeItem('aura_cart'); // Очищаем корзину после фиктивной покупки
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
