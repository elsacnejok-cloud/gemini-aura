<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hollyshop — Интернет-магазин корейской косметики</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-bar">
        <div class="container top-bar__container">
            <div class="top-bar__menu">
                <a href="catalog.html">Магазины</a>
                <a href="catalog.html">Доставка и оплата</a>
                <a href="catalog.html">Бонусная программа</a>
            </div>
            <div>Москва и МО</div>
        </div>
    </div>

    <header class="header-main">
        <div class="container" style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
            <a href="index.html" class="logo-hs">HOLLYSHOP</a>
            
            <div class="search-hs">
                <input type="text" placeholder="Поиск по брендам и средствам..." id="search-input">
                <button id="search-btn"><i class="fas fa-search"></i></button>
            </div>

            <div class="actions-hs">
                <a href="wishlist.html" class="action-item-hs" title="Избранное">
                    <i class="far fa-heart"></i>
                    <span class="badge-hs" id="wishlist-count">0</span>
                </a>
                <a href="cart.html" class="action-item-hs" title="Корзина">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="badge-hs" id="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <h2 class="hs-section-title">Новинки</h2>
        <div class="hs-main-grid" id="new-products-container"></div>

        <h2 class="hs-section-title">Популярные товары</h2>
        <div class="hs-main-grid" id="popular-products-container"></div>
    </main>

    <div class="hs-toast-box" id="toast-container"></div>

    <script src="products.js"></script>
    <script src="main.js"></script>
</body>
</html>
